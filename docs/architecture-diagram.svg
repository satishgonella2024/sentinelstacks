<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="650" viewBox="0 0 900 650">
  <!-- Background -->
  <rect width="900" height="650" fill="#f8fafc" rx="5" ry="5"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">SentinelStacks Architecture</text>
  
  <!-- User Interface Layer -->
  <rect x="50" y="70" width="800" height="100" rx="5" ry="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="90" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e40af">User Interface Layer</text>
  
  <!-- CLI -->
  <rect x="100" y="110" width="200" height="40" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="200" y="135" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">CLI (100%)</text>
  
  <!-- Desktop UI -->
  <rect x="350" y="110" width="200" height="40" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="450" y="135" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Desktop UI (35%)</text>
  
  <!-- Registry UI -->
  <rect x="600" y="110" width="200" height="40" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="700" y="135" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Registry UI (25%)</text>
  
  <!-- API Layer -->
  <rect x="50" y="190" width="800" height="80" rx="5" ry="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="210" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#4338ca">API Layer</text>
  
  <!-- API Service -->
  <rect x="100" y="230" width="200" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="200" y="250" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">API Service</text>
  
  <!-- Authentication -->
  <rect x="350" y="230" width="200" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="450" y="250" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Authentication</text>
  
  <!-- Registry Service -->
  <rect x="600" y="230" width="200" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="700" y="250" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Registry Service</text>
  
  <!-- Core Layer -->
  <rect x="50" y="290" width="800" height="180" rx="5" ry="5" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="310" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#065f46">Core Layer</text>
  
  <!-- Agent Runtime -->
  <rect x="75" y="330" width="350" height="120" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="350" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Agent Runtime</text>
  
  <!-- Memory System -->
  <rect x="100" y="370" width="130" height="30" rx="5" ry="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="165" y="390" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e40af">Memory System (80%)</text>
  
  <!-- State Management -->
  <rect x="100" y="410" width="130" height="30" rx="5" ry="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="165" y="430" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e40af">State Management</text>
  
  <!-- Tool Manager -->
  <rect x="270" y="370" width="130" height="30" rx="5" ry="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="335" y="390" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e40af">Tool Manager (90%)</text>
  
  <!-- Execution Engine -->
  <rect x="270" y="410" width="130" height="30" rx="5" ry="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="335" y="430" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e40af">Execution Engine</text>
  
  <!-- Model Subsystem -->
  <rect x="475" y="330" width="350" height="120" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="650" y="350" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Model Subsystem</text>
  
  <!-- Model Adapter -->
  <rect x="500" y="370" width="130" height="30" rx="5" ry="5" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="565" y="390" font-family="Arial" font-size="12" text-anchor="middle" fill="#065f46">Model Adapter (100%)</text>
  
  <!-- Model Factory -->
  <rect x="500" y="410" width="130" height="30" rx="5" ry="5" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="565" y="430" font-family="Arial" font-size="12" text-anchor="middle" fill="#065f46">Model Factory</text>
  
  <!-- Embedding Engine -->
  <rect x="670" y="370" width="130" height="30" rx="5" ry="5" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="735" y="390" font-family="Arial" font-size="12" text-anchor="middle" fill="#065f46">Embedding Engine</text>
  
  <!-- Provider Config -->
  <rect x="670" y="410" width="130" height="30" rx="5" ry="5" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="735" y="430" font-family="Arial" font-size="12" text-anchor="middle" fill="#065f46">Provider Config</text>
  
  <!-- External Services -->
  <rect x="50" y="490" width="800" height="80" rx="5" ry="5" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="510" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">External Services</text>
  
  <!-- OpenAI -->
  <rect x="100" y="530" width="150" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="175" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">OpenAI</text>
  
  <!-- Claude -->
  <rect x="300" y="530" width="150" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="375" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Claude</text>
  
  <!-- Ollama -->
  <rect x="500" y="530" width="150" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="575" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">Ollama</text>
  
  <!-- External Tools -->
  <rect x="700" y="530" width="150" height="30" rx="5" ry="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="775" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#334155">External Tools</text>
  
  <!-- Infrastructure Layer -->
  <rect x="50" y="590" width="800" height="50" rx="5" ry="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="620" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#b91c1c">Infrastructure (Docker, Nginx, PostgreSQL, Redis)</text>
  
  <!-- Connecting Lines -->
  <!-- UI to API -->
  <line x1="200" y1="150" x2="200" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="450" y1="150" x2="450" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="700" y1="150" x2="700" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- API to Core -->
  <line x1="200" y1="260" x2="250" y2="330" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="450" y1="260" x2="450" y2="290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="700" y1="260" x2="650" y2="330" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Core to External -->
  <line x1="250" y1="450" x2="175" y2="530" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="450" y1="470" x2="450" y2="490" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="650" y1="450" x2="575" y2="530" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- External to Infrastructure -->
  <line x1="175" y1="560" x2="175" y2="590" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="375" y1="560" x2="375" y2="590" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="575" y1="560" x2="575" y2="590" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="775" y1="560" x2="775" y2="590" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Legend -->
  <rect x="100" y="50" width="12" height="12" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="120" y="60" font-family="Arial" font-size="10" fill="#334155">Complete</text>
  
  <rect x="200" y="50" width="12" height="12" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="220" y="60" font-family="Arial" font-size="10" fill="#334155">In Progress</text>
  
  <rect x="300" y="50" width="12" height="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="60" font-family="Arial" font-size="10" fill="#334155">Planned/Integrated</text>
</svg>