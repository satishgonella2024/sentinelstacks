<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <!-- Background -->
  <rect width="1200" height="700" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial" font-size="28" text-anchor="middle" font-weight="bold">SentinelStacks Agent Lifecycle</text>
  
  <!-- Main Flow Stages -->
  <rect x="50" y="80" width="200" height="50" rx="10" fill="#6c5ce7" opacity="0.8" />
  <text x="150" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">CREATE</text>
  
  <rect x="350" y="80" width="200" height="50" rx="10" fill="#6c5ce7" opacity="0.8" />
  <text x="450" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">TEST & REFINE</text>
  
  <rect x="650" y="80" width="200" height="50" rx="10" fill="#6c5ce7" opacity="0.8" />
  <text x="750" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">PUBLISH</text>
  
  <rect x="950" y="80" width="200" height="50" rx="10" fill="#6c5ce7" opacity="0.8" />
  <text x="1050" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">DISTRIBUTE & EVOLVE</text>
  
  <!-- Flow Arrows Between Stages -->
  <path d="M250 105 L350 105" stroke="#6c5ce7" stroke-width="3" fill="none" />
  <polygon points="345,100 350,105 345,110" fill="#6c5ce7" />
  
  <path d="M550 105 L650 105" stroke="#6c5ce7" stroke-width="3" fill="none" />
  <polygon points="645,100 650,105 645,110" fill="#6c5ce7" />
  
  <path d="M850 105 L950 105" stroke="#6c5ce7" stroke-width="3" fill="none" />
  <polygon points="945,100 950,105 945,110" fill="#6c5ce7" />
  
  <!-- CREATE Section -->
  <rect x="50" y="150" width="200" height="500" rx="10" fill="#e9ecef" stroke="#6c5ce7" stroke-width="2" />
  
  <!-- CREATE Content -->
  <rect x="70" y="170" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="150" y="190" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Initialize</text>
  <text x="150" y="215" font-family="Arial" font-size="12" text-anchor="middle">sentinel agentfile init</text>
  <text x="150" y="235" font-family="Arial" font-size="12" text-anchor="middle">--name="research-assistant"</text>
  <text x="150" y="255" font-family="Arial" font-size="12" text-anchor="middle">--model="ollama/llama3"</text>
  
  <rect x="70" y="280" width="160" height="100" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="150" y="300" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Define in Natural Language</text>
  <text x="150" y="325" font-family="Arial" font-size="12" text-anchor="middle">Edit agentfile.natural.txt</text>
  <text x="150" y="345" font-family="Arial" font-size="12" text-anchor="middle">"Research assistant that</text>
  <text x="150" y="365" font-family="Arial" font-size="12" text-anchor="middle">summarizes scientific</text>
  <text x="150" y="385" font-family="Arial" font-size="12" text-anchor="middle">papers from PDFs..."</text>
  
  <rect x="70" y="400" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="150" y="420" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Convert to YAML</text>
  <text x="150" y="445" font-family="Arial" font-size="12" text-anchor="middle">sentinel agentfile convert</text>
  <text x="150" y="465" font-family="Arial" font-size="12" text-anchor="middle">Natural language is parsed</text>
  <text x="150" y="485" font-family="Arial" font-size="12" text-anchor="middle">into structured Agentfile</text>
  
  <rect x="70" y="510" width="160" height="120" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="150" y="530" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Configure Tools</text>
  <text x="150" y="555" font-family="Arial" font-size="12" text-anchor="middle">Edit agentfile.yaml</text>
  <text x="150" y="575" font-family="Arial" font-size="12" text-anchor="middle">Add PDF parser tool</text>
  <text x="150" y="595" font-family="Arial" font-size="12" text-anchor="middle">Configure vector memory</text>
  <text x="150" y="615" font-family="Arial" font-size="12" text-anchor="middle">Define state schema</text>
  
  <!-- TEST & REFINE Section -->
  <rect x="350" y="150" width="200" height="500" rx="10" fill="#e9ecef" stroke="#6c5ce7" stroke-width="2" />
  
  <!-- TEST & REFINE Content -->
  <rect x="370" y="170" width="160" height="80" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="450" y="190" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Validate</text>
  <text x="450" y="215" font-family="Arial" font-size="12" text-anchor="middle">sentinel agentfile validate</text>
  <text x="450" y="235" font-family="Arial" font-size="12" text-anchor="middle">Checks for errors and warnings</text>
  
  <rect x="370" y="270" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="450" y="290" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Local Execution</text>
  <text x="450" y="315" font-family="Arial" font-size="12" text-anchor="middle">sentinel agent run</text>
  <text x="450" y="335" font-family="Arial" font-size="12" text-anchor="middle">Test with sample PDFs</text>
  <text x="450" y="355" font-family="Arial" font-size="12" text-anchor="middle">View debugging output</text>
  
  <rect x="370" y="380" width="160" height="80" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="450" y="400" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Monitor & Debug</text>
  <text x="450" y="425" font-family="Arial" font-size="12" text-anchor="middle">View logs and traces</text>
  <text x="450" y="445" font-family="Arial" font-size="12" text-anchor="middle">Inspect state changes</text>
  
  <rect x="370" y="480" width="160" height="80" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="450" y="500" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Iterate & Refine</text>
  <text x="450" y="525" font-family="Arial" font-size="12" text-anchor="middle">Adjust prompts and behavior</text>
  <text x="450" y="545" font-family="Arial" font-size="12" text-anchor="middle">Test with different models</text>
  
  <rect x="370" y="580" width="160" height="50" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="450" y="600" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Benchmark</text>
  <text x="450" y="620" font-family="Arial" font-size="12" text-anchor="middle">sentinel agent benchmark</text>
  
  <!-- PUBLISH Section -->
  <rect x="650" y="150" width="200" height="500" rx="10" fill="#e9ecef" stroke="#6c5ce7" stroke-width="2" />
  
  <!-- PUBLISH Content -->
  <rect x="670" y="170" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="750" y="190" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Documentation</text>
  <text x="750" y="215" font-family="Arial" font-size="12" text-anchor="middle">Add README.md</text>
  <text x="750" y="235" font-family="Arial" font-size="12" text-anchor="middle">Create usage examples</text>
  <text x="750" y="255" font-family="Arial" font-size="12" text-anchor="middle">Document required inputs</text>
  
  <rect x="670" y="280" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="750" y="300" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Metadata</text>
  <text x="750" y="325" font-family="Arial" font-size="12" text-anchor="middle">Set version, author, tags</text>
  <text x="750" y="345" font-family="Arial" font-size="12" text-anchor="middle">Add license information</text>
  <text x="750" y="365" font-family="Arial" font-size="12" text-anchor="middle">Specify model compatibility</text>
  
  <rect x="670" y="390" width="160" height="100" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="750" y="410" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Pack & Prepare</text>
  <text x="750" y="435" font-family="Arial" font-size="12" text-anchor="middle">sentinel agent pack</text>
  <text x="750" y="455" font-family="Arial" font-size="12" text-anchor="middle">Bundles all resources:</text>
  <text x="750" y="475" font-family="Arial" font-size="12" text-anchor="middle">- Agentfile</text>
  <text x="750" y="495" font-family="Arial" font-size="12" text-anchor="middle">- Tools & dependencies</text>
  
  <rect x="670" y="510" width="160" height="120" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="750" y="530" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Publish to Registry</text>
  <text x="750" y="555" font-family="Arial" font-size="12" text-anchor="middle">sentinel registry push</text>
  <text x="750" y="575" font-family="Arial" font-size="12" text-anchor="middle">--name="research-assistant"</text>
  <text x="750" y="595" font-family="Arial" font-size="12" text-anchor="middle">--version="1.0.0"</text>
  <text x="750" y="615" font-family="Arial" font-size="12" text-anchor="middle">--visibility="public"</text>
  
  <!-- DISTRIBUTE & EVOLVE Section -->
  <rect x="950" y="150" width="200" height="500" rx="10" fill="#e9ecef" stroke="#6c5ce7" stroke-width="2" />
  
  <!-- DISTRIBUTE & EVOLVE Content -->
  <rect x="970" y="170" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="1050" y="190" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Registry Listing</text>
  <text x="1050" y="215" font-family="Arial" font-size="12" text-anchor="middle">Agent appears in registry</text>
  <text x="1050" y="235" font-family="Arial" font-size="12" text-anchor="middle">Searchable by tags</text>
  <text x="1050" y="255" font-family="Arial" font-size="12" text-anchor="middle">Featured in category lists</text>
  
  <rect x="970" y="280" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="1050" y="300" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Community Usage</text>
  <text x="1050" y="325" font-family="Arial" font-size="12" text-anchor="middle">Users can discover and run:</text>
  <text x="1050" y="345" font-family="Arial" font-size="12" text-anchor="middle">sentinel stack pull</text>
  <text x="1050" y="365" font-family="Arial" font-size="12" text-anchor="middle">username/research-assistant</text>
  
  <rect x="970" y="390" width="160" height="90" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="1050" y="410" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Feedback Collection</text>
  <text x="1050" y="435" font-family="Arial" font-size="12" text-anchor="middle">User ratings and reviews</text>
  <text x="1050" y="455" font-family="Arial" font-size="12" text-anchor="middle">Usage statistics</text>
  <text x="1050" y="475" font-family="Arial" font-size="12" text-anchor="middle">Community contributions</text>
  
  <rect x="970" y="500" width="160" height="130" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="1050" y="520" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Iterate & Evolve</text>
  <text x="1050" y="545" font-family="Arial" font-size="12" text-anchor="middle">Incorporate feedback</text>
  <text x="1050" y="565" font-family="Arial" font-size="12" text-anchor="middle">Release new versions</text>
  <text x="1050" y="585" font-family="Arial" font-size="12" text-anchor="middle">sentinel registry push</text>
  <text x="1050" y="605" font-family="Arial" font-size="12" text-anchor="middle">--version="1.1.0"</text>
  <text x="1050" y="625" font-family="Arial" font-size="12" text-anchor="middle">sentinel registry deprecate</text>
  
  <!-- Desktop UI Callout -->
  <rect x="100" y="660" width="1000" height="30" rx="5" fill="#ffffff" stroke="#6c5ce7" stroke-width="1" />
  <text x="600" y="680" font-family="Arial" font-size="14" text-anchor="middle" font-style="italic">All these operations are available via CLI and Desktop UI interfaces</text>
</svg>
