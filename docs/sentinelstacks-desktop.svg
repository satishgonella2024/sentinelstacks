<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700">
  <!-- Background -->
  <rect width="950" height="700" fill="#f8fafc" rx="10" ry="10" />
  
  <!-- Window Header -->
  <rect x="0" y="0" width="950" height="30" fill="#1e1e2e" rx="10" ry="10" />
  <circle cx="20" cy="15" r="6" fill="#ff5f56" />
  <circle cx="40" cy="15" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="15" r="6" fill="#27c93f" />
  <text x="475" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">SentinelStacks Desktop</text>
  
  <!-- Sidebar -->
  <rect x="0" y="30" width="200" height="670" fill="#1e1e2e" />
  
  <!-- Sidebar Navigation -->
  <rect x="0" y="120" width="200" height="40" fill="#6c5ce7" />
  <text x="50" y="145" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">🏠 Dashboard</text>
  
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">⚡ My Agents</text>
  <text x="50" y="225" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">🧩 Agent Builder</text>
  <text x="50" y="265" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">📦 Registry</text>
  <text x="50" y="305" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">🔄 Model Hub</text>
  <text x="50" y="345" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">📊 Analytics</text>
  <text x="50" y="385" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">⚙️ Settings</text>
  
  <!-- Sidebar Logo -->
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">SentinelStacks</text>
  
  <!-- User Profile -->
  <rect x="20" y="620" width="160" height="50" rx="5" ry="5" fill="#2d2d3f" />
  <circle cx="45" cy="645" r="15" fill="#6c5ce7" />
  <text x="45" y="650" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">JD</text>
  <text x="115" y="640" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Jane Doe</text>
  <text x="115" y="655" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0">Pro Tier</text>
  
  <!-- Main Content Area -->
  <rect x="200" y="30" width="750" height="670" fill="#ffffff" />
  
  <!-- Dashboard Header -->
  <text x="230" y="70" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">Dashboard</text>
  
  <!-- Quick Actions -->
  <rect x="720" y="50" width="200" height="35" rx="5" ry="5" fill="#6c5ce7" />
  <text x="820" y="73" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff">+ Create New Agent</text>
  
  <!-- Stats Row -->
  <rect x="230" y="90" width="210" height="100" rx="10" ry="10" fill="#f1f5f9" />
  <text x="250" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Active Agents</text>
  <text x="250" y="155" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6c5ce7">5</text>
  <text x="290" y="155" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Running</text>
  
  <rect x="460" y="90" width="210" height="100" rx="10" ry="10" fill="#f1f5f9" />
  <text x="480" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Registry Agents</text>
  <text x="480" y="155" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6c5ce7">12</text>
  <text x="520" y="155" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Downloaded</text>
  
  <rect x="690" y="90" width="210" height="100" rx="10" ry="10" fill="#f1f5f9" />
  <text x="710" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Models Connected</text>
  <text x="710" y="155" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6c5ce7">3</text>
  <text x="750" y="155" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Ready</text>
  
  <!-- Running Agents -->
  <text x="230" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Running Agents</text>
  
  <!-- Agent 1 -->
  <rect x="230" y="240" width="670" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <rect x="250" y="260" width="40" height="40" rx="5" ry="5" fill="#6c5ce7" opacity="0.2" />
  <text x="270" y="285" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6c5ce7">🔍</text>
  
  <text x="310" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Research Assistant</text>
  <text x="310" y="290" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Analyzing 3 papers • Ollama/Llama3 • 15m uptime</text>
  
  <rect x="730" y="260" width="70" height="30" rx="15" ry="15" fill="#6c5ce7" opacity="0.1" />
  <text x="765" y="280" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6c5ce7">Active</text>
  
  <rect x="810" y="260" width="70" height="30" rx="5" ry="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="845" y="280" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">View</text>
  
  <!-- Agent 2 -->
  <rect x="230" y="330" width="670" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <rect x="250" y="350" width="40" height="40" rx="5" ry="5" fill="#6c5ce7" opacity="0.2" />
  <text x="270" y="375" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6c5ce7">📝</text>
  
  <text x="310" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Report Generator</text>
  <text x="310" y="380" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Creating quarterly summary • Claude • 45m uptime</text>
  
  <rect x="730" y="350" width="70" height="30" rx="15" ry="15" fill="#6c5ce7" opacity="0.1" />
  <text x="765" y="370" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6c5ce7">Active</text>
  
  <rect x="810" y="350" width="70" height="30" rx="5" ry="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="845" y="370" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">View</text>
  
  <!-- Agent 3 -->
  <rect x="230" y="420" width="670" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <rect x="250" y="440" width="40" height="40" rx="5" ry="5" fill="#cbd5e1" opacity="0.2" />
  <text x="270" y="465" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#64748b">💡</text>
  
  <text x="310" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Code Assistant</text>
  <text x="310" y="470" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Idle • GPT-4 • Last run: 2h ago</text>
  
  <rect x="730" y="440" width="70" height="30" rx="15" ry="15" fill="#cbd5e1" opacity="0.1" />
  <text x="765" y="460" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">Idle</text>
  
  <rect x="810" y="440" width="70" height="30" rx="5" ry="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="845" y="460" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">View</text>
  
  <!-- Recent Activity -->
  <text x="230" y="530" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Recent Activity</text>
  
  <!-- Activity Timeline -->
  <line x1="270" y1="550" x2="270" y2="650" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- Activity 1 -->
  <circle cx="270" cy="560" r="6" fill="#6c5ce7" />
  <text x="290" y="565" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">New Agent Created</text>
  <text x="750" y="565" font-family="Arial, sans-serif" font-size="12" fill="#64748b">10 minutes ago</text>
  <text x="290" y="585" font-family="Arial, sans-serif" font-size="13" fill="#64748b">You created "Research Assistant" agent with Ollama/Llama3</text>
  
  <!-- Activity 2 -->
  <circle cx="270" cy="610" r="6" fill="#6c5ce7" />
  <text x="290" y="615" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Model Connected</text>
  <text x="750" y="615" font-family="Arial, sans-serif" font-size="12" fill="#64748b">25 minutes ago</text>
  <text x="290" y="635" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Successfully connected to Ollama running locally</text>
</svg>
