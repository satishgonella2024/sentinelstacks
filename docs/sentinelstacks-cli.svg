<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1e1e1e" rx="10" ry="10" />
  
  <!-- Terminal Header -->
  <rect x="0" y="0" width="800" height="30" fill="#333333" rx="10" ry="10" />
  <circle cx="20" cy="15" r="7" fill="#ff5f56" />
  <circle cx="45" cy="15" r="7" fill="#ffbd2e" />
  <circle cx="70" cy="15" r="7" fill="#27c93f" />
  <text x="400" y="20" font-family="Monaco, monospace" font-size="12" text-anchor="middle" fill="#cccccc">Terminal - sentinel CLI</text>
  
  <!-- CLI Content -->
  <text x="20" y="60" font-family="Monaco, monospace" font-size="14" fill="#8fe9fd">user@machine:~$</text>
  <text x="150" y="60" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">sentinel --help</text>
  
  <text x="20" y="90" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">SentinelStacks CLI v0.1.0</text>
  <text x="20" y="110" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">Docker for AI Agents</text>
  
  <text x="20" y="140" font-family="Monaco, monospace" font-size="14" fill="#ff79c6">USAGE:</text>
  <text x="20" y="160" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">  sentinel [command] [flags]</text>
  
  <text x="20" y="190" font-family="Monaco, monospace" font-size="14" fill="#ff79c6">COMMANDS:</text>
  <text x="20" y="210" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  agent        Manage agents and run them</text>
  <text x="20" y="230" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  agentfile    Create and manage Agentfiles</text>
  <text x="20" y="250" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  registry     Interact with the agent registry</text>
  <text x="20" y="270" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  stack        Manage stacks of agents</text>
  <text x="20" y="290" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  model        Manage model connections</text>
  <text x="20" y="310" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">  completion   Generate shell completions</text>
  
  <text x="20" y="340" font-family="Monaco, monospace" font-size="14" fill="#ff79c6">FLAGS:</text>
  <text x="20" y="360" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">  -h, --help      Show help information</text>
  <text x="20" y="380" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">  -v, --version   Show version information</text>
  <text x="20" y="400" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">  --config FILE   Path to config file (default: ~/.sentinelstacks/config.yaml)</text>
  
  <!-- New Command -->
  <text x="20" y="440" font-family="Monaco, monospace" font-size="14" fill="#8fe9fd">user@machine:~$</text>
  <text x="150" y="440" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">sentinel agentfile create --name research-assistant</text>
  
  <text x="20" y="470" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">Creating new Agentfile 'research-assistant'</text>
  <text x="20" y="490" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">✓ Initialized agentfile.yaml</text>
  <text x="20" y="510" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">✓ Created agentfile.natural.txt for natural language definition</text>
  <text x="20" y="530" font-family="Monaco, monospace" font-size="14" fill="#f8f8f2">✓ Added default state schema</text>
  <text x="20" y="550" font-family="Monaco, monospace" font-size="14" fill="#50fa7b">Done! Edit agentfile.natural.txt to define your agent's purpose and behavior.</text>
  <text x="20" y="570" font-family="Monaco, monospace" font-size="14" fill="#8fe9fd">user@machine:~$</text>
</svg>
