project_name: sentinelstacks

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/sentinel/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: sentinelstacks
    tap:
      owner: satishgonella2024
      name: homebrew-sentinelstacks
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    folder: Formula
    homepage: "https://sentinelstacks.com"
    description: "AI-powered infrastructure management platform"
    license: "MIT"
    test: |
      system "#{bin}/sentinel version"
    install: |
      bin.install "sentinel"

checksum:
  name_template: 'checksums.txt'

signs:
  - artifacts: checksum
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch 