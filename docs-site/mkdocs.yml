site_name: SentinelStacks Documentation
site_description: Documentation for SentinelStacks, the Docker for AI Agents
site_author: Satish Gonella
repo_url: https://github.com/satishgonella2024/sentinelstacks
repo_name: satishgonella2024/sentinelstacks

# Theme and customization
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

# Extensions
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.emoji
  - attr_list
  - def_list
  - footnotes

# Navigation structure
nav:
  - Home: index.md
  - Getting Started: 
    - Quick Start: getting-started/index.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - First Steps: getting-started/first-steps.md
  - User Guide:
    - Overview: user-guide/index.md
    - CLI Reference: user-guide/cli-reference.md
    - Model Adapters: user-guide/model-adapters.md
    - Memory System: user-guide/memory.md
    - Tools Framework: user-guide/tools.md
  - Developer Guide:
    - Architecture: developer-guide/architecture.md
    - Contributing: developer-guide/contributing.md
    - API Reference: developer-guide/api-reference.md
  - Status & Roadmap: roadmap.md
